<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GB Emu — simple player</title>
<style>
:root {
  --bg: #14161a;
  --panel: #1e2126;
  --border: #2c3038;
  --accent: #8bac0f;   /* classic DMG green, used for UI accents only */
  --accent-dark: #306230;
  --text: #e7e9ec;
  --text-dim: #9096a1;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.top-bar {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 12px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-weight: 700;
  font-size: 1.1rem;
  letter-spacing: 0.02em;
  color: var(--accent);
}

.rom-title {
  color: var(--text-dim);
  font-size: 0.9rem;
}

main {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  padding: 40px 24px;
  max-width: 900px;
  margin: 0 auto;
}

.player {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 28px;
  flex-wrap: wrap;
}

.screen-frame {
  position: relative;
  background: #0c0d0f;
  border: 8px solid var(--panel);
  border-radius: 10px;
  padding: 8px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  flex: 0 0 auto;
}

#screen {
  width: 480px;
  height: 432px;
  image-rendering: pixelated;
  display: block;
  background: #ffffff;
}

.screen-placeholder {
  position: absolute;
  inset: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  background: #0c0d0f;
  border-radius: 4px;
  font-size: 0.95rem;
  text-align: center;
  padding: 16px;
}

.side-panel {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 260px;
  flex: 0 0 auto;
}

.controls-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.btn {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.15s ease;
}
.btn:hover:not(:disabled) { background: #262a31; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn.primary { background: var(--accent-dark); border-color: var(--accent-dark); }
.btn.primary:hover:not(:disabled) { background: #3a7a3a; }

.volume-control {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-dim);
  font-size: 0.9rem;
}
.volume-control input[type="range"] {
  accent-color: var(--accent);
}

.playtime-badge {
  font-variant-numeric: tabular-nums;
  font-size: 0.82rem;
  padding: 4px 9px;
  border-radius: 6px;
  border: 1px solid var(--border);
  color: var(--text-dim);
  background: var(--panel);
}
.playtime-badge.playtime-green { color: var(--accent); border-color: var(--accent-dark); }
.playtime-badge.playtime-amber { color: #e0a838; border-color: #7a5f1f; }
.playtime-badge.playtime-red { color: #e05d4a; border-color: #7a2e22; }

.file-drop {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 14px;
  border: 1px dashed var(--border);
  border-radius: 8px;
  color: var(--text-dim);
  font-size: 0.85rem;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.15s ease, color 0.15s ease;
}
.file-drop:hover, .file-drop.drag-over {
  border-color: var(--accent);
  color: var(--text);
}
.file-drop input[type="file"] { display: none; }

.rom-info {
  display: none;
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--panel);
  font-size: 0.82rem;
  line-height: 1.55;
}
.rom-info .rom-info-title {
  color: var(--text);
  font-weight: 600;
  letter-spacing: 0.02em;
  margin-bottom: 2px;
}
.rom-info .rom-info-line {
  color: var(--text-dim);
}
.rom-info .rom-info-line span {
  color: var(--text);
}

.side-help {
  width: 100%;
  padding-top: 4px;
  border-top: 1px solid var(--border);
}
.side-help h2 {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-dim);
  margin: 12px 0 8px;
}
.keymap {
  border-collapse: collapse;
  font-size: 0.88rem;
  width: 100%;
}
.keymap td {
  padding: 4px 8px;
  border-bottom: 1px solid var(--border);
}
.keymap td:first-child { color: var(--text-dim); text-align: left; }
.keymap td:last-child { text-align: right; }

.note {
  margin-top: 20px;
  font-size: 0.82rem;
  line-height: 1.5;
  color: var(--text-dim);
}

@media (max-width: 640px) {
  .player { flex-direction: column; }
  #screen { width: 360px; height: 324px; }
  .side-panel { width: 100%; max-width: 360px; align-items: center; }
}
</style>
</head>
<body>

<header class="top-bar">
  <span class="logo">GB Emu</span>
  <span class="rom-title" id="romTitle">No ROM loaded</span>
  <span class="playtime-badge" id="playTime" title="Continuous play time this session">00:00</span>
</header>

<main>
  <section class="player">
    <div class="screen-frame">
      <canvas id="screen" width="160" height="144"></canvas>
      <div class="screen-placeholder" id="screenPlaceholder">Load a ROM to start playing</div>
    </div>

    <div class="side-panel">
      <label class="file-drop" id="dropZone">
        <input type="file" id="fileInput" accept=".gb,.gbc,.bin,.zip">
        <span id="dropLabel">Pick or drag a ROM (.gb) or .zip</span>
      </label>
      <div class="rom-info" id="romInfo">
        <div class="rom-info-title" id="infoTitle"></div>
        <div class="rom-info-line">Mapper: <span id="infoMapper"></span></div>
        <div class="rom-info-line">Size: <span id="infoSize"></span></div>
        <div class="rom-info-line">Checksum: <span id="infoChecksum"></span></div>
      </div>
      <div class="controls-row">
        <button class="btn primary" id="btnPlayPause" disabled>▶ Play</button>
        <button class="btn" id="btnReset" disabled>⟲ Reset</button>
        <button class="btn" id="btnSpeed" disabled title="Toggle 2x speed">1x</button>
      </div>
      <label class="volume-control">
        🔊
        <input type="range" id="volumeSlider" min="0" max="100" value="50">
      </label>

      <div class="side-help">
        <h2>Controls</h2>
        <table class="keymap">
          <tr><td>D-Pad</td><td>Arrow keys</td></tr>
          <tr><td>A</td><td>X</td></tr>
          <tr><td>B</td><td>Z</td></tr>
          <tr><td>Start</td><td>Enter</td></tr>
          <tr><td>Select</td><td>Shift</td></tr>
          <tr><td>Turbo</td><td>T</td></tr>
        </table>
      </div>
    </div>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crc-32/1.2.2/crc32.min.js"></script>
<script src="emu-gb-core.js"></script>
<script>
/* =========================================================================================
   Educational-use guardrails
   -----------------------------------------------------------------------------------------
   Keeps this an emulator-debugging/teaching tool rather than a way to just play games:

   - Commercial-ROM filter: blocks ROMs matching a prebuilt No-Intro bloom filter, so only
     homebrew/non-commercial ROMs load. Both the GB and GBC filters are checked regardless
     of which one a given ROM actually is.
   - Play-time cap: the badge next to the playback controls colors amber/red, warns, and
     eventually auto-reloads the page after a set amount of continuous runtime.

   Both are gated behind one master switch, GUARDRAIL_CONFIG.ENABLED, so they can be turned
   off entirely (e.g. for testing) by flipping that one flag to false.
   ========================================================================================= */

const GUARDRAIL_CONFIG = {
  ENABLED: true,             // master switch: gates both the play-time cap and the commercial-ROM filter. Set to false for testing.
  PLAY_TIME_BASE_UNIT: 60,   // seconds per unit; set to 1 for fast manual testing
  PLAY_TIME_UNITS_TOTAL: 10, // hard cap, in units of PLAY_TIME_BASE_UNIT (10 units * 60s = 10 minutes)
};

function pad2(n) { return String(n).padStart(2, '0'); }

// Decodes a base64 string (as used in GAME_FILTER_DATA below) into raw bytes.
function base64ToU8(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

/* ---- commercial-ROM filter: blocks ROMs matching a prebuilt No-Intro bloom filter, keeping
   this limited to homebrew/non-commercial ROMs. Both GB and GBC filters are checked regardless
   of core. Filter data must be exported by the Bloom Filter Builder tool using its "BLMF"
   header format (magic + version + hash type + m + k + CRC32 checksum). ---- */

// Bloom filter used to exclude commercial games.
//
// Reads the "BLMF" header format written by the Bloom Filter Builder tool:
//   [0:4]   magic      "BLMF" signature
//   [4]     version    format version number
//   [5]     hashType   id of the hash function used to build the filter (0 = FNV-1a salted)
//   [6:10]  m          number of bits in the filter (uint32, little-endian)
//   [10]    k          number of hash rounds (uint8)
//   [11:15] checksum   CRC32 of the bit array (uint32, little-endian)
//   [15:]   bit array
class BloomFilter {
    static HEADER_SIZE = 15;
    static MAGIC = 'BLMF';
    static HASH_TYPE_NAMES = { 0: 'FNV-1a (salted)' };

    constructor(arrayBuffer) {
        if (arrayBuffer.byteLength < BloomFilter.HEADER_SIZE) {
            throw new Error(`buffer too small (${arrayBuffer.byteLength} bytes) for a valid filter header`);
        }

        const dataView = new DataView(arrayBuffer, 0, BloomFilter.HEADER_SIZE);
        const magic = String.fromCharCode(
            dataView.getUint8(0), dataView.getUint8(1), dataView.getUint8(2), dataView.getUint8(3)
        );
        if (magic !== BloomFilter.MAGIC) {
            throw new Error(`bad signature "${magic}" - not a recognized Bloom filter file`);
        }

        this.version = dataView.getUint8(4);
        this.hashType = dataView.getUint8(5);
        this.m = dataView.getUint32(6, true);
        this.k = dataView.getUint8(10);
        this.checksum = dataView.getUint32(11, true);

        this.bitArray = new Uint8Array(arrayBuffer, BloomFilter.HEADER_SIZE);

        // crc-32 library (cdnjs crc-32 1.2.2) exposes CRC32.buf(), returning a signed
        // 32-bit int; normalize to unsigned so it compares correctly against the header value.
        const actualChecksum = CRC32.buf(this.bitArray) >>> 0;
        this.checksumValid = actualChecksum === this.checksum;

        const hashTypeName = BloomFilter.HASH_TYPE_NAMES[this.hashType] || `unknown (${this.hashType})`;
        console.log(`Configured from header -> v${this.version}, hash=${hashTypeName}, Bits (m): ${this.m}, Hashes (k): ${this.k}, checksum ${this.checksumValid ? 'OK' : 'MISMATCH'}`);
        if (!this.checksumValid) {
            console.warn(`Bloom filter checksum mismatch (expected ${this.checksum.toString(16)}, got ${actualChecksum.toString(16)}) - data may be corrupted or truncated. Proceeding, but treat matches/misses from this filter with caution.`);
        }
    }

    _hash(item, i) {
        const salted = `${i}:${item.toLowerCase().trim()}`;
        let hash = 0x811c9dc5;
        for (let j = 0; j < salted.length; j++) {
            hash ^= salted.charCodeAt(j);
            hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
        }
        return Math.abs(hash) % this.m;
    }

    isCommercial(crc32) {
        for (let i = 0; i < this.k; i++) {
            const bitPosition = this._hash(crc32, i);
            const byteIndex = Math.floor(bitPosition / 8);
            const bitIndex = bitPosition % 8;

            if ((this.bitArray[byteIndex] & (1 << bitIndex)) === 0) {
                return false;
            }
        }
        return true;
    }
}

};

let commercialRomFilters = { gb: null, gbc: null }; // each becomes a BloomFilter instance once decoded; stays null if disabled, missing, or unparsable

function loadCommercialRomFilter(coreKey) {
  try {
    const b64 = GAME_FILTER_DATA[coreKey];
    if (!b64) throw new Error('no data for this core in GAME_FILTER_DATA');
    const buf = base64ToU8(b64).buffer;
    commercialRomFilters[coreKey] = new BloomFilter(buf);
    console.log(`Commercial-ROM filter (${coreKey.toUpperCase()}) loaded (${(buf.byteLength / 1024).toFixed(1)} KB, m=${commercialRomFilters[coreKey].m}, k=${commercialRomFilters[coreKey].k}).`);
  } catch (err) {
    console.warn(`Commercial-ROM filter (${coreKey.toUpperCase()}) not loaded (${err.message}) - commercial-ROM check is disabled for ${coreKey.toUpperCase()} ROMs this session.`);
  }
}
if (GUARDRAIL_CONFIG.ENABLED) {
  loadCommercialRomFilter('gb');
  loadCommercialRomFilter('gbc');
}

// Checks `bytes` against both GB/GBC filters. Called before touching any loaded-ROM state,
// and returns the CRC32 too so the caller can show it in its "blocked" message.
function checkCommercialRomGate(bytes) {
  const crc32Hex = (CRC32.buf(bytes) >>> 0).toString(16).toUpperCase().padStart(8, '0');
  const blocked = (commercialRomFilters.gb && commercialRomFilters.gb.isCommercial(crc32Hex))
    || (commercialRomFilters.gbc && commercialRomFilters.gbc.isCommercial(crc32Hex));
  return { blocked, crc32: crc32Hex };
}

/* ---- play-time limit: caps continuous emulator runtime so this stays a debugging tool
   rather than a way to play through games. Thresholds are fractions of TOTAL_LIMIT. ---- */
const PLAY_TIME_LIMIT = GUARDRAIL_CONFIG.ENABLED; // master switch
const PLAY_TIME_TOTAL_LIMIT = GUARDRAIL_CONFIG.PLAY_TIME_UNITS_TOTAL * GUARDRAIL_CONFIG.PLAY_TIME_BASE_UNIT; // hard cap
const PLAY_TIME_LIMIT_CONFIG = {
  TOTAL_LIMIT: PLAY_TIME_TOTAL_LIMIT,          // page reloads automatically once reached
  AMBER_AT: 0.5 * PLAY_TIME_TOTAL_LIMIT,       // badge switches green -> amber
  RED_AT: 0.8 * PLAY_TIME_TOTAL_LIMIT,         // badge switches amber -> red
  WARNING_ALERT: 0.8 * PLAY_TIME_TOTAL_LIMIT,  // one-time alert() threshold
};

// Play-time timer (badge next to the playback controls): wall-clock time the current ROM has
// been running, polled so it stays correct regardless of how playback was started/stopped.
const playTimeLabel = document.getElementById('playTime');
let playTimeSeconds = 0;
let playTimeLastTick = null; // performance.now() at last tick while running, else null
let playTimeWarningShown = false; // fires the WARNING_ALERT alert() only once per run
let playTimeLimitReached = false; // guards location.reload() to fire only once

function formatPlayTime(totalSeconds) {
  const s = Math.floor(totalSeconds);
  const hh = Math.floor(s / 3600);
  const mm = Math.floor((s % 3600) / 60);
  const ss = s % 60;
  return hh > 0 ? `${hh}:${pad2(mm)}:${pad2(ss)}` : `${pad2(mm)}:${pad2(ss)}`;
}

function resetPlayTime() {
  playTimeSeconds = 0;
  playTimeLastTick = emulator.running ? performance.now() : null;
  playTimeWarningShown = false;
  playTimeLimitReached = false;
  playTimeLabel.textContent = formatPlayTime(0);
  playTimeLabel.classList.remove('playtime-green', 'playtime-amber', 'playtime-red');
}

function tickPlayTime() {
  // Timer always runs; PLAY_TIME_LIMIT only gates enforcement (coloring/alert/reload).
  const now = performance.now();
  if (emulator.running) {
    if (playTimeLastTick !== null) playTimeSeconds += (now - playTimeLastTick) / 1000;
    playTimeLastTick = now;
  } else {
    playTimeLastTick = null;
  }
  playTimeLabel.textContent = formatPlayTime(playTimeSeconds);

  if (!PLAY_TIME_LIMIT) return;

  const { TOTAL_LIMIT, AMBER_AT, RED_AT, WARNING_ALERT } = PLAY_TIME_LIMIT_CONFIG;

  playTimeLabel.classList.toggle('playtime-red', playTimeSeconds >= RED_AT);
  playTimeLabel.classList.toggle('playtime-amber', playTimeSeconds >= AMBER_AT && playTimeSeconds < RED_AT);
  playTimeLabel.classList.toggle('playtime-green', playTimeSeconds < AMBER_AT);

  if (!playTimeWarningShown && playTimeSeconds >= WARNING_ALERT) {
    playTimeWarningShown = true;
    alert(`This emulator is for educational purposes and isn't intended for playing games. ` +
          `This session has been running for ${formatPlayTime(WARNING_ALERT)}. ` +
          `It'll auto-reload at ${formatPlayTime(TOTAL_LIMIT)} of continuous use.`);
  }

  if (!playTimeLimitReached && playTimeSeconds >= TOTAL_LIMIT) {
    playTimeLimitReached = true;
    location.reload();
  }
}
setInterval(tickPlayTime, 500);

<script>
/* =========================================================================================
   Small app layer: wires GBEmulator up to a canvas (video), Web Audio (sound), and the
   keyboard (input). This is intentionally thin — all the actual emulation logic lives in
   emu-gb-core.js.
   ========================================================================================= */

const emulator = new GBEmulator();

// ---- Video: draw the emulator's framebuffer onto the canvas each frame ----
const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');
const imageData = ctx.createImageData(160, 144);

emulator.onFrame = () => {
  imageData.data.set(emulator.getFramebuffer());
  ctx.putImageData(imageData, 0, 0);
};

// ---- Audio: pull mixed samples from the emulator and play them via Web Audio ----
let audioCtx = null;
let scriptNode = null;
let gainNode = null;

// Human hearing perceives loudness roughly logarithmically, not linearly — mapping the
// slider straight to gain (0-100 -> 0.0-1.0) spends most of the slider's range sounding
// "loud", since e.g. 0.5 gain doesn't sound "half as loud" as 1.0. Map the 0-100 slider to
// decibels instead, then convert dB -> linear gain, so the low end is actually usable and
// each step of the slider feels like a roughly equal change in loudness.
function sliderToGain(sliderValue) {
  const v = Math.max(0, Math.min(100, sliderValue));
  if (v <= 0) return 0;
  const MIN_DB = -40; // slider=100 -> 0dB (gain 1.0); slider approaching 0 -> -40dB (near-silent)
  const db = MIN_DB * (1 - v / 100);
  return Math.pow(10, db / 20);
}

function setupAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  emulator.setSampleRate(audioCtx.sampleRate);

  gainNode = audioCtx.createGain();
  gainNode.gain.value = sliderToGain(document.getElementById('volumeSlider').value);
  gainNode.connect(audioCtx.destination);

  const BUFFER_SIZE = 2048;
  scriptNode = audioCtx.createScriptProcessor(BUFFER_SIZE, 0, 2);
  scriptNode.onaudioprocess = (e) => {
    const { left, right } = emulator.drainAudioSamples(BUFFER_SIZE);
    e.outputBuffer.copyToChannel(left, 0);
    e.outputBuffer.copyToChannel(right, 1);
  };
  scriptNode.connect(gainNode);
}

emulator.onAudioResume = () => { setupAudio(); audioCtx.resume(); };
emulator.onAudioSuspend = () => { audioCtx?.suspend(); };

document.getElementById('volumeSlider').addEventListener('input', (e) => {
  if (gainNode) gainNode.gain.value = sliderToGain(e.target.value);
});

// ---- Input: map keyboard to the joypad ----
// bit numbers match Joypad.setButton()'s expectations: directions 0=Right 1=Left 2=Up 3=Down,
// buttons 0=A 1=B 2=Select 3=Start.
const KEY_MAP = {
  ArrowRight: [0, true], ArrowLeft: [1, true], ArrowUp: [2, true], ArrowDown: [3, true],
  KeyZ: [1, false], KeyX: [0, false], ShiftLeft: [2, false], ShiftRight: [2, false], Enter: [3, false],
};

window.addEventListener('keydown', (e) => {
  if (e.code === 'KeyT') {
    if (!e.repeat) toggleTurbo();
    e.preventDefault();
    return;
  }
  const mapping = KEY_MAP[e.code];
  if (!mapping) return;
  e.preventDefault();
  emulator.setButton(mapping[0], true, mapping[1]);
});
window.addEventListener('keyup', (e) => {
  const mapping = KEY_MAP[e.code];
  if (!mapping) return;
  e.preventDefault();
  emulator.setButton(mapping[0], false, mapping[1]);
});

// ---- ROM loading (file picker or drag & drop, including .zip archives) ----
const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const dropLabel = document.getElementById('dropLabel');
const screenPlaceholder = document.getElementById('screenPlaceholder');
const btnPlayPause = document.getElementById('btnPlayPause');
const btnReset = document.getElementById('btnReset');
const btnSpeed = document.getElementById('btnSpeed');
const romTitleEl = document.getElementById('romTitle');
const romInfoEl = document.getElementById('romInfo');
const infoTitleEl = document.getElementById('infoTitle');
const infoMapperEl = document.getElementById('infoMapper');
const infoSizeEl = document.getElementById('infoSize');
const infoChecksumEl = document.getElementById('infoChecksum');

// Cartridge type byte (header offset 0x147) -> human-readable mapper/hardware description.
const CART_TYPES = {
  0x00: 'ROM ONLY', 0x01: 'MBC1', 0x02: 'MBC1+RAM', 0x03: 'MBC1+RAM+BATTERY',
  0x05: 'MBC2', 0x06: 'MBC2+BATTERY',
  0x08: 'ROM+RAM', 0x09: 'ROM+RAM+BATTERY',
  0x0B: 'MMM01', 0x0C: 'MMM01+RAM', 0x0D: 'MMM01+RAM+BATTERY',
  0x0F: 'MBC3+TIMER+BATTERY', 0x10: 'MBC3+TIMER+RAM+BATTERY', 0x11: 'MBC3',
  0x12: 'MBC3+RAM', 0x13: 'MBC3+RAM+BATTERY',
  0x19: 'MBC5', 0x1A: 'MBC5+RAM', 0x1B: 'MBC5+RAM+BATTERY',
  0x1C: 'MBC5+RUMBLE', 0x1D: 'MBC5+RUMBLE+RAM', 0x1E: 'MBC5+RUMBLE+RAM+BATTERY',
  0x20: 'MBC6', 0x22: 'MBC7+SENSOR+RUMBLE+RAM+BATTERY',
  0xFC: 'POCKET CAMERA', 0xFD: 'BANDAI TAMA5', 0xFE: 'HuC3', 0xFF: 'HuC1+RAM+BATTERY',
};

function getMapperName(bytes) {
  const cartByte = bytes[0x147];
  return CART_TYPES[cartByte] || `Unknown (0x${cartByte.toString(16).toUpperCase().padStart(2, '0')})`;
}

// Header offset 0x148: 0 = 32KB, doubling per step (standard cartridge sizes).
function getRomSizeKB(bytes) {
  const sizeByte = bytes[0x148];
  return 32 * (1 << sizeByte);
}

function showRomInfo(bytes, title) {
  infoTitleEl.textContent = title || '(untitled)';
  infoMapperEl.textContent = getMapperName(bytes);
  infoSizeEl.textContent = `${getRomSizeKB(bytes)} KB`;
  infoChecksumEl.textContent = `0x${(CRC32.buf(bytes) >>> 0).toString(16).toUpperCase().padStart(8, '0')}`;
  romInfoEl.style.display = 'block';
}

function loadROMBytes(bytes) {
  if (GUARDRAIL_CONFIG.ENABLED) {
    const { blocked, crc32 } = checkCommercialRomGate(bytes);
    if (blocked) {
      throw new Error(`This ROM (CRC32 0x${crc32}) matches a known commercial release and can't be loaded here — only homebrew/non-commercial ROMs are allowed.`);
    }
  }
  emulator.loadROM(bytes);
  romTitleEl.textContent = emulator.romTitle;
  showRomInfo(bytes, emulator.romTitle);
  screenPlaceholder.style.display = 'none';
  btnPlayPause.disabled = false;
  btnReset.disabled = false;
  btnSpeed.disabled = false;
  resetPlayTime();
  emulator.start();
  updatePlayPauseLabel();
}

// ---- Minimal ZIP reading (no library): locate the End Of Central Directory record,
// walk the central directory to find a .gb/.gbc entry, then decompress just that entry
// with the browser's built-in DecompressionStream. ----

const ZIP_EOCD_SIG = 0x06054b50;
const ZIP_CD_SIG = 0x02014b50;

function findEOCD(view, length) {
  const minPos = Math.max(0, length - 22 - 0xFFFF); // EOCD is at most 22 + 64KB comment from the end
  for (let i = length - 22; i >= minPos; i--) {
    if (view.getUint32(i, true) === ZIP_EOCD_SIG) return i;
  }
  throw new Error('Not a valid zip file.');
}

async function inflateRaw(compressedBytes) {
  const stream = new Blob([compressedBytes]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
  return new Uint8Array(await new Response(stream).arrayBuffer());
}

// Pulls the first .gb/.gbc ROM entry out of a zip archive (a common way GB ROMs are shared).
async function extractROMFromZip(file) {
  const bytes = new Uint8Array(await file.arrayBuffer());
  const view = new DataView(bytes.buffer);

  const eocdOffset = findEOCD(view, bytes.length);
  const entryCount = view.getUint16(eocdOffset + 10, true);
  let pos = view.getUint32(eocdOffset + 16, true); // central directory offset

  for (let i = 0; i < entryCount; i++) {
    if (view.getUint32(pos, true) !== ZIP_CD_SIG) throw new Error('Malformed zip central directory.');

    const method = view.getUint16(pos + 10, true);
    const compSize = view.getUint32(pos + 20, true);
    const nameLen = view.getUint16(pos + 28, true);
    const extraLen = view.getUint16(pos + 30, true);
    const commentLen = view.getUint16(pos + 32, true);
    const localHeaderOffset = view.getUint32(pos + 42, true);
    const name = new TextDecoder().decode(bytes.subarray(pos + 46, pos + 46 + nameLen));

    if (/\.(gb|gbc)$/i.test(name)) {
      const localNameLen = view.getUint16(localHeaderOffset + 26, true);
      const localExtraLen = view.getUint16(localHeaderOffset + 28, true);
      const dataStart = localHeaderOffset + 30 + localNameLen + localExtraLen;
      const compressed = bytes.subarray(dataStart, dataStart + compSize);

      if (method === 0) return compressed.slice(); // stored, no compression
      if (method === 8) return await inflateRaw(compressed); // deflate
      throw new Error('Unsupported zip compression method.');
    }

    pos += 46 + nameLen + extraLen + commentLen;
  }
  throw new Error('No .gb/.gbc file found inside the zip.');
}

async function handleFile(file) {
  if (!file) return;
  try {
    if (/\.zip$/i.test(file.name)) {
      dropLabel.textContent = 'Unzipping…';
      loadROMBytes(await extractROMFromZip(file));
    } else {
      const buffer = await file.arrayBuffer();
      loadROMBytes(new Uint8Array(buffer));
    }
    dropLabel.textContent = 'Pick or drag a ROM (.gb) or .zip';
  } catch (err) {
    dropLabel.textContent = err.message || 'Could not load that file.';
  }
}

fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});

// ---- Playback controls ----
function updatePlayPauseLabel() {
  btnPlayPause.textContent = emulator.running ? '⏸ Pause' : '▶ Play';
}
btnPlayPause.addEventListener('click', () => {
  if (emulator.running) emulator.pause(); else emulator.start();
  updatePlayPauseLabel();
});
btnReset.addEventListener('click', () => {
  if (!emulator.hasROM()) return;
  const wasRunning = emulator.running;
  if (wasRunning) emulator.pause();
  emulator.loadROM(emulator.mmu.rom);
  if (wasRunning) emulator.start();
  updatePlayPauseLabel();
});
function toggleTurbo() {
  if (btnSpeed.disabled) return;
  emulator.speed = emulator.speed === 1 ? 2 : 1;
  btnSpeed.textContent = emulator.speed + 'x';
}
btnSpeed.addEventListener('click', toggleTurbo);
</script>

</body>
